kind = "web"
previewPath = "/"
title = "Marketplace Local"
version = "1.0.0"
id = "artifacts/marketplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20787
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/marketplace run dev"

[services.env]
PORT = "20787"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/marketplace", "run", "build"]
publicDir = "artifacts/marketplace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
